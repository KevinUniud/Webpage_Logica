server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy for the exercise generator API to avoid browser CORS/mixed-content issues.
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host 158.110.146.199;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://158.110.146.199:5000/api/;
    }

    location /api/revisione {
        proxy_pass http://host.docker.internal:5555/upload-json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /health {
        proxy_http_version 1.1;
        proxy_set_header Host 158.110.146.199;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://158.110.146.199:5000/health;
    }
}
